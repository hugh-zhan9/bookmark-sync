<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" style="background: transparent;">
  <defs>
    <!-- Soft dropshadow for the cloud -->
    <filter id="cloud-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.15" />
    </filter>
    
    <!-- Shadow for the ribbon to stand out over the cloud -->
    <filter id="ribbon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>

    <!-- Cloud white-silver gradient for neomorphic volume -->
    <linearGradient id="cloud-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>

    <!-- Rainbow / Vibrant gradient for the bookmark ribbon -->
    <linearGradient id="ribbon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b4b"/>
      <stop offset="33%" stop-color="#f59e0b"/>
      <stop offset="66%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- CLOUD LAYER -->
  <g filter="url(#cloud-shadow)">
    <!-- Base large bottom pill -->
    <rect x="76" y="240" width="360" height="140" rx="70" fill="url(#cloud-grad)" />
    <!-- Left small puff -->
    <circle cx="160" cy="240" r="70" fill="url(#cloud-grad)" />
    <!-- Center tall puff -->
    <circle cx="260" cy="200" r="100" fill="url(#cloud-grad)" />
    <!-- Right medium puff -->
    <circle cx="360" cy="240" r="80" fill="url(#cloud-grad)" />
  </g>

  <!-- BOOKMARK RIBBON LAYER -->
  <g filter="url(#ribbon-shadow)">
    <!-- Main Bookmark Body -->
    <path 
      d="M320 80 
         L420 80 
         L420 440 
         L370 390 
         L320 440 
         Z" 
      fill="url(#ribbon-grad)" 
    />
    <!-- Glossy / Glassmorphism subtle overlay on the ribbon -->
    <path 
      d="M320 80 L370 80 L370 440 L320 440 Z" 
      fill="#ffffff" 
      fill-opacity="0.2" 
    />
  </g>
</svg>
